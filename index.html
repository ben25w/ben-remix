<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben's Remix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.6s ease-in-out;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            text-align: center;
            padding: 40px;
            border-radius: 20px;
            transition: all 0.6s ease-in-out;
        }

        h1 {
            font-size: 5rem;
            margin-bottom: 15px;
            transition: all 0.6s ease-in-out;
        }

        #date-display {
            font-size: 1.4rem;
            margin-bottom: 30px;
            opacity: 0.85;
            transition: all 0.6s ease-in-out;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello Ben</h1>
        <p id="date-display"></p>
        <button onclick="remixStyle()">REMIX</button>
    </div>

    <script>
        const styles = [
            {
                name: 'Purple Gradient',
                bgGradient: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                textColor: '#ffffff',
                fontFamily: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif",
                fontSize: '5rem',
                containerBg: 'transparent'
            },
            {
                name: 'Sunset Flame',
                bgGradient: 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                textColor: '#ffffff',
                fontFamily: "'Georgia', serif",
                fontSize: '4.5rem',
                containerBg: 'rgba(0, 0, 0, 0.1)'
            },
            {
                name: 'Ocean Blue',
                bgGradient: 'linear-gradient(135deg, #0093E9 0%, #80D0C7 100%)',
                textColor: '#001a4d',
                fontFamily: "'Arial', sans-serif",
                fontSize: '5.5rem',
                containerBg: 'rgba(255, 255, 255, 0.15)'
            },
            {
                name: 'Forest Green',
                bgGradient: 'linear-gradient(135deg, #134E5E 0%, #71B280 100%)',
                textColor: '#ffffff',
                fontFamily: "'Courier New', monospace",
                fontSize: '4.8rem',
                containerBg: 'rgba(255, 255, 255, 0.08)'
            },
            {
                name: 'Citrus Dream',
                bgGradient: 'linear-gradient(135deg, #FA8BFF 0%, #2BD2FF 90%, #2BFF88 100%)',
                textColor: '#1a1a1a',
                fontFamily: "'Comic Sans MS', cursive",
                fontSize: '5rem',
                containerBg: 'rgba(255, 255, 255, 0.2)'
            },
            {
                name: 'Midnight Gold',
                bgGradient: 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #e4af37 100%)',
                textColor: '#e4af37',
                fontFamily: "'Times New Roman', serif",
                fontSize: '4.5rem',
                containerBg: 'rgba(0, 0, 0, 0.3)'
            },
            {
                name: 'Berry Blast',
                bgGradient: 'linear-gradient(135deg, #c31432 0%, #240b36 100%)',
                textColor: '#ffd700',
                fontFamily: "'Trebuchet MS', sans-serif",
                fontSize: '5.2rem',
                containerBg: 'rgba(255, 215, 0, 0.05)'
            },
            {
                name: 'Mint Fresh',
                bgGradient: 'linear-gradient(135deg, #00d4ff 0%, #0099ff 100%)',
                textColor: '#00cc00',
                fontFamily: "'Verdana', sans-serif",
                fontSize: '4.8rem',
                containerBg: 'rgba(0, 204, 0, 0.05)'
            },
            {
                name: 'Peachy Keen',
                bgGradient: 'linear-gradient(135deg, #FFB347 0%, #FFAA52 50%, #FF6B6B 100%)',
                textColor: '#ffffff',
                fontFamily: "'Impact', sans-serif",
                fontSize: '5.5rem',
                containerBg: 'rgba(255, 255, 255, 0.1)'
            },
            {
                name: 'Electric Neon',
                bgGradient: 'linear-gradient(135deg, #0a0e27 0%, #1a1550 100%)',
                textColor: '#00ff00',
                fontFamily: "'Courier New', monospace",
                fontSize: '5rem',
                containerBg: 'rgba(0, 255, 0, 0.05)'
            }
        ];

        let currentStyle = 0;

        function getFormattedDate() {
            return new Date().toLocaleDateString('en-GB', {
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
            });
        }

        function remixStyle() {
            currentStyle = Math.floor(Math.random() * styles.length);
            const style = styles[currentStyle];

            const body = document.body;
            const h1 = document.querySelector('h1');
            const dateDisplay = document.getElementById('date-display');
            const container = document.querySelector('.container');

            body.style.background = style.bgGradient;
            h1.style.color = style.textColor;
            h1.style.fontFamily = style.fontFamily;
            h1.style.fontSize = style.fontSize;
            dateDisplay.style.color = style.textColor;
            dateDisplay.style.fontFamily = style.fontFamily;
            container.style.backgroundColor = style.containerBg;
            container.style.backdropFilter = 'blur(10px)';
        }

        // Set initial random style and date on page load
        window.addEventListener('load', () => {
            document.getElementById('date-display').textContent = getFormattedDate();
            remixStyle();
        });
    </script>
</body>
</html>
